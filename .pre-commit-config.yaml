---
repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # C/C++ formatting
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.7
    hooks:
      - id: clang-format
        types_or: [c, c++]
        args: [--style=file]

  # CMake formatting and linting
  - repo: https://github.com/cheshirekow/cmake_format
    rev: v0.6.13
    hooks:
      - id: cmake-format
        args: [--config-files, .cmake-format.yaml]
      - id: cmake-lint
        args: [--config-files, .cmake-format.yaml]

  # QML formatting
  - repo: https://github.com/tomas-krupa/qmlformat-hook
    rev: 1.2.0
    hooks:
      - id: qmlformat

  # Local hooks that depend on system tools (clang-tidy)
  - repo: local
    hooks:
      # clang-tidy — requires compile_commands.json in one of the build dirs.
      # Run `cmake --preset clang-debug` once before using this hook.
      - id: clang-tidy
        name: clang-tidy
        entry: clang-tidy
        language: system
        types_or: [c, c++]
        args:
          - --config-file=.clang-tidy
          - -p=builds/clang/debug
        require_serial: true
