---
repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # C/C++ formatting
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.7
    hooks:
      - id: clang-format
        types_or: [c, c++]
        args: [--style=file]

  # CMake formatting and linting
  # cmakelang is the pip package that ships both cmake-format and cmake-lint.
  # cheshirekow/cmake_format has no .pre-commit-hooks.yaml, so we install
  # the package directly into the pre-commit environment instead.
  - repo: local
    hooks:
      - id: cmake-format
        name: cmake-format
        entry: cmake-format
        language: python
        additional_dependencies: [cmakelang, PyYAML]
        files: '(CMakeLists\.txt|\.cmake)$'
        args: [--config-file=.cmake-format.yaml, --in-place]
      - id: cmake-lint
        name: cmake-lint
        entry: cmake-lint
        language: python
        additional_dependencies: [cmakelang, PyYAML]
        files: '(CMakeLists\.txt|\.cmake)$'
        args: [--config-file=.cmake-format.yaml]

  # Commit message convention (Conventional Commits)
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - docs
          - style
          - refactor
          - perf
          - test
          - build
          - ci
          - chore
          - revert

  # QML formatting — uses the system qmlformat shipped with Qt6.
  # tomas-krupa/qmlformat-hook pins PySide6-Essentials==6.9.1 which requires
  # Python <3.14 and is therefore incompatible with this system (Python 3.14).
  - repo: local
    hooks:
      - id: qmlformat
        name: qmlformat
        entry: qmlformat
        language: system
        files: \.qml$
        args: [--inplace]

  # Local hooks that depend on system tools (clang-tidy)
  - repo: local
    hooks:
      # clang-tidy — requires compile_commands.json in one of the build dirs.
      # Run `cmake --preset clang-debug` once before using this hook.
      - id: clang-tidy
        name: clang-tidy
        # Skips gracefully when builds/clang/debug/compile_commands.json is
        # absent. Run `cmake --preset clang-debug` once to enable this hook.
        # The Clang preset generates a compile DB without -mno-direct-extern-access
        # (a GCC-only Qt6 flag that causes a hard error when passed to Clang).
        # gui/ is excluded because Qt6::Widgets is not in the default compile DB
        # (VCIC_BUILD_GUI=OFF); reconfigure with -DVCIC_BUILD_GUI=ON to include it.
        entry: >-
          bash -c '
          DB=builds/clang/debug/compile_commands.json;
          if [ ! -f "$DB" ]; then
            echo "clang-tidy: skipped — run cmake --preset clang-debug first";
            exit 0;
          fi;
          exec clang-tidy --config-file=.clang-tidy -p=builds/clang/debug "$@"
          ' --
        language: system
        types_or: [c, c++]
        exclude: '^gui/'
        require_serial: true
